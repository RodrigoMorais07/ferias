<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Status do Sistema</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-S8DG16QQ05"></script>
<script>
window.dataLayer=window.dataLayer||[];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config','G-S8DG16QQ05');
</script>
<style>
body{margin:0;background:#0d1117;color:#58a6ff;font-family:Consolas,monospace}
#boot,#main{display:flex;justify-content:center;align-items:center;min-height:100vh}
#main{display:none;padding:15px}
.box{max-width:820px;width:100%;background:#11151b;border:2px solid #58a6ff;padding:22px;box-shadow:0 0 20px #58a6ff55}
.progress{height:22px;border:2px solid #58a6ff;width:min(500px,90vw)}
.fill{height:100%;width:0;background:#58a6ff}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.item{display:flex;justify-content:space-between;border-bottom:1px dotted #355}
button{background:#58a6ff;color:#111;border:0;padding:12px 20px;font-weight:bold;border-radius:6px;cursor:pointer}
#countdown,#response{text-align:center;margin-top:20px}
@media(max-width:700px){.grid{grid-template-columns:1fr}.box{padding:16px}h1{font-size:1.6rem}}
</style>
</head>
<body>
<div id="boot"><div style="text-align:center">
<h1>Inicializando Sistema...</h1>
<div class="progress"><div class="fill" id="fill"></div></div>
<p id="pct">0%</p>
<button onclick="boot()">▶ Iniciar Sistema</button>
</div></div>
<div id="main"><div class="box">
<h1>⚠ STATUS DO SISTEMA</h1><hr>
<h2>404 - Analista não encontrado</h2>
<p>🏖 Estou em um curto período de férias.</p>
<div class="grid">
<div class="item"><span>Teams</span><span>🔴 Offline</span></div>
<div class="item"><span>VPN</span><span>Desconectada</span></div>
<div class="item"><span>Ping</span><span>Timeout</span></div>
<div class="item"><span>CPU</span><span>Descansando</span></div>
<div class="item"><span>RAM</span><span>Recarregando</span></div>
<div class="item"><span>☕ Café</span><span>███████░░ 70%</span></div>
<div class="item"><span>Chamados</span><span>Em espera</span></div>
<div class="item"><span>Status</span><span>Férias</span></div>
</div>
<div id="countdown"></div>
<p style="text-align:center"><button onclick="retry()">🔄 Tentar novamente</button></p>
<div id="response"></div>
<p style="text-align:center;color:#9aa">Obrigado pela compreensão 😄</p>
</div></div>
<script>
const msgs=[
"❌ Ainda estou de férias 😄",
"404 - Analista ainda não encontrado.",
"📡 Ping: Request Timed Out.",
"☕ O café ainda não fez efeito.",
"🛠️ Chamado registrado. Atendimento após o retorno.",
"😎 Aproveite para perguntar ao estagiário."
];
const retorno=new Date("2026-07-23T08:00:00");
function beep(f,d){let c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.type="square";o.frequency.value=f;o.connect(g);g.connect(c.destination);g.gain.value=.08;o.start();g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+d/1000);o.stop(c.currentTime+d/1000);}
function boot(){beep(900,100);setTimeout(()=>beep(1200,100),180);let i=0,t=setInterval(()=>{i++;fill.style.width=i+"%";pct.textContent=i+"%";if(i>=100){clearInterval(t);boot=document.getElementById("boot");boot.style.display="none";main.style.display="flex";}},20);}
function retry(){gtag('event','tentar_novamente');response.textContent="Consultando disponibilidade...";setTimeout(()=>response.textContent=msgs[Math.floor(Math.random()*msgs.length)],1200);}
function upd(){let d=retorno-new Date();if(d<0){countdown.innerHTML="<h2>🎉 Analista disponível novamente!</h2>";return;}
let dias=Math.floor(d/86400000),h=Math.floor(d%86400000/3600000),m=Math.floor(d%3600000/60000),s=Math.floor(d%60000/1000);
countdown.innerHTML="<h3>⏳ Retorno em</h3><h2>"+dias+"d "+h+"h "+m+"m "+s+"s</h2>";
}
setInterval(upd,1000);upd();
</script>
</body></html>
